<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galáxia para Bel 💕</title>
<style>
  :root{
    --pink: #ff6fa5;
    --purple: #8a4fff;
    --gold: #ffd76b;
    --night: #060418;
  }

  * { box-sizing: border-box; margin:0; padding:0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--night);
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
  }

  /* ---------- NEBULOSA DE FUNDO (CSS) ---------- */
  .nebula-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.55;
    mix-blend-mode: screen;
    z-index: 0;
    pointer-events: none;
  }
  #neb1 { width: 60vw; height: 60vw; background: var(--pink); top: -15vw; left: -10vw; animation: driftA 22s ease-in-out infinite; }
  #neb2 { width: 55vw; height: 55vw; background: var(--purple); bottom: -15vw; right: -10vw; animation: driftB 26s ease-in-out infinite; }
  #neb3 { width: 40vw; height: 40vw; background: #3a7bff; top: 30vh; left: 35vw; animation: driftC 30s ease-in-out infinite; opacity: 0.35; }

  @keyframes driftA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(6vw, 8vw); } }
  @keyframes driftB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-7vw, -6vw); } }
  @keyframes driftC { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-4vw, 5vw) scale(1.15); } }

  canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
    display: block;
  }

  /* ---------- BOTAO INICIAL ---------- */
  #start-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #start-screen.hidden {
    opacity: 0;
    transform: scale(0.7);
    pointer-events: none;
  }

  #start-text {
    color: #ffd6e8;
    font-size: 1.3rem;
    text-shadow: 0 0 10px rgba(255,150,200,0.8);
    text-align: center;
    animation: floatText 3s ease-in-out infinite;
  }

  @keyframes floatText {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  #cute-button {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 35% 30%, #ffd1e6, var(--pink) 60%, var(--purple) 100%);
    box-shadow:
      0 0 25px rgba(255,111,165,0.8),
      0 0 60px rgba(138,79,255,0.5),
      inset 0 -6px 14px rgba(0,0,0,0.2);
    font-size: 3rem;
    cursor: pointer;
    color: white;
    animation: pulse 1.6s ease-in-out infinite;
    transition: transform 0.2s ease;
  }

  #cute-button:hover { transform: scale(1.12) rotate(-4deg); }
  #cute-button:active { transform: scale(0.9); }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 25px rgba(255,111,165,0.8), 0 0 60px rgba(138,79,255,0.5), inset 0 -6px 14px rgba(0,0,0,0.2); }
    50% { box-shadow: 0 0 45px rgba(255,111,165,1), 0 0 90px rgba(138,79,255,0.8), inset 0 -6px 14px rgba(0,0,0,0.2); }
  }

  footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    z-index: 5;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="nebula-blob" id="neb1"></div>
  <div class="nebula-blob" id="neb2"></div>
  <div class="nebula-blob" id="neb3"></div>

  <canvas id="galaxy"></canvas>

  <div id="start-screen">
    <div id="start-text">SÓ LEMBRANDO QUE VOCÊ TEM O SORRISO MAIS LINDO DO MUNDO. 🥺💗</div>
    <button id="cute-button">💖</button>
  </div>

  <footer>feito com 💜 só pra você, Bel</footer>

<script>
(function(){
  const canvas = document.getElementById('galaxy');
  const ctx = canvas.getContext('2d');
  let W, H, CX, CY;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W/2; CY = H/2;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- Path do coração (unidades normalizadas) ----------
  const heartPath = new Path2D(
    "M0,0.3 C0,0.1,-0.25,-0.15,-0.5,-0.15 C-0.85,-0.15,-1,0.15,-1,0.35 " +
    "C-1,0.65,-0.7,0.9,0,1.4 C0.7,0.9,1,0.65,1,0.35 " +
    "C1,0.15,0.85,-0.15,0.5,-0.15 C0.25,-0.15,0,0.1,0,0.3 Z"
  );

  function drawHeart(x, y, size, color, alpha, rot){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    if (rot) ctx.rotate(rot);
    ctx.scale(size, size);
    ctx.translate(0, -0.6);
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.fill(heartPath);
    ctx.restore();
  }

  // ---------- Estrelas de fundo ----------
  const stars = [];
  function buildStars(){
    stars.length = 0;
    const count = Math.floor((W*H)/9000);
    for (let i=0;i<count;i++){
      stars.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: Math.random()*1.6+0.4,
        phase: Math.random()*Math.PI*2,
        speed: Math.random()*1.5+0.5
      });
    }
  }
  buildStars();
  window.addEventListener('resize', buildStars);

  // ---------- Poeira giratória da galáxia ----------
  const dust = [];
  function buildDust(){
    dust.length = 0;
    const count = 160;
    const maxR = Math.max(W,H)*0.75;
    const palette = ['#ff6fa5','#8a4fff','#6fd3ff','#ffd76b'];
    for (let i=0;i<count;i++){
      dust.push({
        angle: Math.random()*Math.PI*2,
        radius: Math.random()*maxR*0.9 + maxR*0.1,
        speed: (Math.random()*0.0003+0.00008) * (Math.random()<0.5?1:-1),
        size: Math.random()*1.8+0.6,
        color: palette[Math.floor(Math.random()*palette.length)],
        squash: 0.45 + Math.random()*0.1
      });
    }
  }
  buildDust();
  window.addEventListener('resize', buildDust);

  // ---------- Gerar pontos de texto "BEL" / "I LOVE YOU" ----------
  function buildTextPoints(){
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');
    const lines = ["BEL", "I LOVE YOU"];

    let fontSize = Math.min(W, H) * 0.32;
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    function fits(fs){
      octx.font = `900 ${fs}px 'Trebuchet MS', sans-serif`;
      let maxWidth = 0;
      for (const l of lines) maxWidth = Math.max(maxWidth, octx.measureText(l).width);
      const totalHeight = fs * 1.15 * lines.length;
      return maxWidth <= W*0.88 && totalHeight <= H*0.62;
    }

    while (fontSize > 8 && !fits(fontSize)) fontSize *= 0.94;

    octx.font = `900 ${fontSize}px 'Trebuchet MS', sans-serif`;
    octx.fillStyle = '#fff';
    const lineHeight = fontSize * 1.15;
    const totalHeight = lineHeight * lines.length;
    const startY = CY - totalHeight/2 + lineHeight/2;

    lines.forEach((line, i) => {
      octx.fillText(line, CX, startY + i*lineHeight);
    });

    const data = octx.getImageData(0,0,W,H).data;
    const step = Math.max(3, Math.floor(Math.min(W,H)/230));
    const points = [];
    for (let y=0; y<H; y+=step){
      for (let x=0; x<W; x+=step){
        const idx = (y*W + x)*4 + 3;
        if (data[idx] > 120){
          points.push({x, y});
        }
      }
    }
    return points;
  }

  // ---------- Partículas (corações que formam o texto) ----------
  let particles = [];
  const palette = ['#ff6fa5','#ff9ecb','#c9a3ff','#8a4fff','#ffd76b','#6fd3ff','#ff4f8b'];

  function buildParticles(){
    const points = buildTextPoints();
    // limitar quantidade para performance
    const maxParticles = 1100;
    let pts = points;
    if (pts.length > maxParticles){
      // amostragem aleatoria
      const shuffled = pts.slice().sort(()=>Math.random()-0.5);
      pts = shuffled.slice(0, maxParticles);
    }

    const maxR = Math.max(W,H)*0.85;

    particles = pts.map((p, i) => {
      const angle = Math.random()*Math.PI*2;
      const radius = Math.random()*maxR*0.6 + maxR*0.3;
      return {
        tx: p.x, ty: p.y,
        x: CX + Math.cos(angle)*radius,
        y: CY + Math.sin(angle)*radius*0.5,
        angle, radius,
        orbitSpeed: (Math.random()*0.0015+0.0006) * (Math.random()<0.5?1:-1),
        delay: Math.random()*2600,
        state: 'orbit',
        color: palette[Math.floor(Math.random()*palette.length)],
        size: Math.random()*4 + 4,
        phase: Math.random()*Math.PI*2,
        phaseSpeed: Math.random()*0.05+0.02
      };
    });
  }

  // ---------- Loop de animação ----------
  let startTime = null;
  let running = false;

  function frame(t){
    if (!startTime) startTime = t;
    const elapsed = t - startTime;
    const dt = 16;

    ctx.clearRect(0,0,W,H);

    // estrelas
    stars.forEach(s => {
      const a = 0.35 + 0.65*Math.abs(Math.sin(elapsed*0.001*s.speed + s.phase));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // poeira giratoria
    dust.forEach(d => {
      d.angle += d.speed * dt;
      const x = CX + Math.cos(d.angle)*d.radius;
      const y = CY + Math.sin(d.angle)*d.radius*d.squash;
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = d.color;
      ctx.beginPath();
      ctx.arc(x, y, d.size, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // particulas coraçao
    particles.forEach(p => {
      if (p.state === 'orbit'){
        if (elapsed > p.delay){
          p.state = 'homing';
        } else {
          p.angle += p.orbitSpeed * dt;
          p.x = CX + Math.cos(p.angle)*p.radius;
          p.y = CY + Math.sin(p.angle)*p.radius*0.5;
        }
      }

      if (p.state === 'homing'){
        p.x += (p.tx - p.x) * 0.07;
        p.y += (p.ty - p.y) * 0.07;
        if (Math.abs(p.tx-p.x) < 0.6 && Math.abs(p.ty-p.y) < 0.6){
          p.state = 'arrived';
        }
      }

      let drawX = p.x, drawY = p.y, sizeMul = 1, alpha = 0.95;

      if (p.state === 'arrived'){
        p.phase += p.phaseSpeed;
        drawX = p.tx + Math.sin(p.phase)*1.5;
        drawY = p.ty + Math.cos(p.phase*0.8)*1.5;
        sizeMul = 0.85 + Math.sin(p.phase*1.3)*0.2;
        alpha = 0.85 + Math.sin(p.phase)*0.15;
      }

      drawHeart(drawX, drawY, p.size*sizeMul, p.color, alpha, 0);
    });

    if (running) requestAnimationFrame(frame);
  }

  // ---------- Botao inicial ----------
  const btn = document.getElementById('cute-button');
  const startScreen = document.getElementById('start-screen');

  btn.addEventListener('click', () => {
    startScreen.classList.add('hidden');
    buildParticles();
    running = true;
    startTime = null;
    requestAnimationFrame(frame);
    btn.disabled = true;
  });

  // desenha so as estrelas enquanto espera o clique
  function idleStars(t){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => {
      const a = 0.2 + 0.5*Math.abs(Math.sin(t*0.0008*s.speed + s.phase));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    if (!running) requestAnimationFrame(idleStars);
  }
  requestAnimationFrame(idleStars);

})();
</script>
</body>
</html>
